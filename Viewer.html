<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배고파냥 - 라이브 송출 뷰어</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; position: relative; z-index: 60; pointer-events: none; }
        #connection-status { position: absolute; top: 15px; right: 15px; font-size: 14px; color: #00ff00; z-index: 100; text-shadow: 1px 1px 0 #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="connection-status">🔴 서버 연결 대기중...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const PIXEL_SIZE = 6;
        let currentUser = new URLSearchParams(window.location.search).get('user');
        
        let userData = { settings: null };
        let masterDB = { cats: {}, foods: {} };
        let donorHistory = {};
        let activeCats = [];
        let foods = [];
        let floatTexts = [];

        // Ngrok 외부 접속 경로 파싱
        const urlParams = new URLSearchParams(window.location.search);
        const ngrokWs = urlParams.get('ws');
        let assetBaseUrl = "http://127.0.0.1:8340"; // 지정된 포트 8340
        
        if (ngrokWs && ngrokWs !== "null" && ngrokWs !== "undefined" && ngrokWs.trim() !== "") {
            let cleanNgrok = ngrokWs.replace(/\/+$/, "");
            assetBaseUrl = cleanNgrok.replace("wss://", "https://").replace("ws://", "http://");
        }

        const LOCAL_CAT_DB_URL = `${assetBaseUrl}/modules/m_begopanyang/image/d_catdesign/`;
        const LOCAL_FOOD_DB_URL = `${assetBaseUrl}/modules/m_begopanyang/image/d_fooddesign/`;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let oldW = window.innerWidth;
        let oldH = window.innerHeight;
        
        function resize() { 
            const newW = window.innerWidth; 
            const newH = window.innerHeight; 
            
            if (activeCats.length > 0) {
                const wRatio = oldW ? (newW / oldW) : 1;
                activeCats.forEach(c => { c.x *= wRatio; c.y = newH - 100; });
            }
            if (foods.length > 0) {
                const wRatio = oldW ? (newW / oldW) : 1;
                foods.forEach(f => { f.x *= wRatio; if (f.isGrounded) f.y = newH - 100; });
            }

            canvas.width = newW; 
            canvas.height = newH; 
            oldW = newW; oldH = newH;
        }
        window.addEventListener('resize', resize);
        resize();

        class Cat {
            constructor(donorData, rank) {
                this.donorName = donorData.nickname;
                this.donorThumb = donorData.thumb || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjNDQ0Ii8+PC9zdmc+';
                this.totalCoin = donorData.totalCoin;
                this.rank = rank;
                this.catId = donorData.catId;
                this.stateData = donorData.stats; 
                
                this.x = window.innerWidth + 100;
                this.y = canvas.height - 100;
                this.state = 'ENTER'; 
                this.direction = -1; 
                
                this.targetFood = null;
                this.wanderTimer = Math.random() * 3000 + 6000; 
                this.wanderX = null;

                this.domElement = document.createElement('img');
                this.domElement.style.position = 'absolute';
                this.domElement.style.pointerEvents = 'none';
                this.domElement.style.transform = 'translate(-50%, -100%)';
                this.domElement.style.zIndex = '50';
                this.domElement.style.imageRendering = 'pixelated'; 
                this.domElement.style.display = 'none';
                
                this.domElement.onerror = () => { this.domElement.style.opacity = '0'; };
                this.domElement.onload = () => { this.domElement.style.opacity = '1'; };
                
                document.body.appendChild(this.domElement);
                this.currentAnimSrc = null;

                this.avatarImg = new Image();
                this.avatarImg.src = this.donorThumb;
            }

            updateData(totalCoin, rank) {
                this.totalCoin = totalCoin;
                this.rank = rank;
            }

            exit() { this.state = 'EXIT'; }

            update() {
                this.speedPerFrame = this.stateData.speed / 10;
                this.eatPerFrame = this.stateData.eating / 10;

                if (this.state === 'ENTER') {
                    this.x -= Math.max(3, this.speedPerFrame * 2);
                    this.direction = -1;
                    if (this.x < window.innerWidth - 150) this.state = 'IDLE';
                    return;
                }
                if (this.state === 'EXIT') {
                    this.x += Math.max(4, this.speedPerFrame * 3);
                    this.direction = 1;
                    if (this.x > window.innerWidth + 150) {
                        this.domElement.remove();
                        activeCats = activeCats.filter(c => c !== this);
                    }
                    return;
                }

                if (this.stateData.hp <= 0) this.state = 'SLEEPING';
                
                if (this.state === 'SLEEPING') {
                    this.stateData.hp += (this.stateData.maxHp * 0.03) / 60; 
                    if (this.stateData.hp >= this.stateData.maxHp * 0.3) this.state = 'IDLE'; 
                    return; 
                }

                let availableFoods = foods.filter(f => f.isGrounded);
                if ((this.state === 'IDLE' || this.state === 'MOVE' || this.state === 'WANDER') && availableFoods.length > 0) {
                    availableFoods.sort((a, b) => Math.abs(a.x - this.x) - Math.abs(b.x - this.x));
                    this.targetFood = availableFoods[0];
                    this.state = 'MOVE';
                } else if (availableFoods.length === 0 && this.state === 'MOVE') {
                    this.state = 'IDLE';
                    this.targetFood = null;
                }

                if (this.state === 'IDLE') {
                    this.stateData.hp = Math.min(this.stateData.maxHp, this.stateData.hp + (this.stateData.maxHp * 0.02) / 60);
                    this.wanderTimer--;
                    if (this.wanderTimer <= 0) {
                        this.wanderX = Math.random() * (canvas.width - 100) + 50;
                        this.state = 'WANDER';
                        this.wanderTimer = Math.random() * 3000 + 6000; 
                    }
                }

                if (this.state === 'WANDER') {
                    const dist = this.wanderX - this.x;
                    if (Math.abs(dist) < 5) {
                        this.state = 'IDLE';
                    } else {
                        this.direction = dist > 0 ? 1 : -1;
                        this.x += Math.sign(dist) * this.speedPerFrame;
                        this.stateData.hp -= 5 / 60; 
                    }
                }

                if (this.state === 'MOVE' && this.targetFood) {
                    if (!this.targetFood.isGrounded) {
                        this.state = 'IDLE';
                        this.targetFood = null;
                    } else {
                        const dist = this.targetFood.x - this.x;
                        if (Math.abs(dist) < 5) {
                            this.state = 'EATING';
                        } else {
                            this.direction = dist > 0 ? 1 : -1;
                            this.x += Math.sign(dist) * this.speedPerFrame;
                            this.stateData.hp -= 5 / 60; 
                        }
                    }
                }

                if (this.state === 'EATING' && this.targetFood) {
                    if (this.targetFood.pt <= 0) {
                        this.state = 'IDLE';
                        this.targetFood = null;
                    } else {
                        let eatAmt = Math.min(this.eatPerFrame, this.targetFood.pt);
                        this.targetFood.pt -= eatAmt;
                        this.stateData.hp = Math.min(this.stateData.maxHp, this.stateData.hp + eatAmt);
                        this.stateData.exp += eatAmt;
                        this.stateData.hp -= 5 / 60; 

                        this.targetFood.w = Math.max(0, (this.targetFood.pt / this.targetFood.maxPt) * 100);

                        const reqExp = 100 + ((this.stateData.level - 1) * 200);
                        if (this.stateData.exp >= reqExp) {
                            this.stateData.level++;
                            this.stateData.exp -= reqExp;
                            
                            for(let i=0; i<20; i++) {
                                let r = Math.floor(Math.random() * 3);
                                if(r === 0) this.stateData.speed += 1;
                                else if(r === 1) this.stateData.eating += 1;
                                else this.stateData.maxHp += 1;
                            }
                            this.stateData.hp = this.stateData.maxHp; 

                            floatTexts.push({ text: "✨LEVEL UP!✨", x: this.x, y: this.y - 80, life: 100, color: '#00ffcc' });
                        }
                    }
                }
            }

           // [이렇게 교체해 주십시오]
            draw() {
                // 마스터 DB 구조 기반 파일 경로 유추
                let catObj = masterDB.cats ? masterDB.cats[this.catId] : null;
                
                if (!catObj && masterDB.cats) {
                    let fallbackCats = Object.keys(masterDB.cats).filter(k => masterDB.cats[k] && masterDB.cats[k].filename && masterDB.cats[k].filename.includes('idle'));
                    if (fallbackCats.length > 0) {
                        this.catId = fallbackCats[Math.floor(Math.random() * fallbackCats.length)];
                        catObj = masterDB.cats[this.catId];
                        if (donorHistory[this.donorName]) donorHistory[this.donorName].catId = this.catId;
                    }
                }

                let targetAnim = null;
                
                if (catObj && catObj.filename) {
                    const baseName = catObj.filename.replace('_idle', ''); // 블루_idle_s.gif -> 블루_s.gif 로직은 실제 DB 구축 방식에 따라 다름. 여기선 단순 교체
                    
                    // 핵심 수정: 'idle' 텍스트만 상태값으로 정밀 치환 (예: 치즈_idle_s.gif -> 치즈_move_s.gif)
                    const newFileName = catObj.filename.replace('idle', stateTag);
                    targetAnim = `${LOCAL_CAT_DB_URL}${catObj.folder}/${newFileName}`;
                }

                if (targetAnim) {
                    if (this.currentAnimSrc !== targetAnim) {
                        this.domElement.src = targetAnim;
                        this.currentAnimSrc = targetAnim;
                    }
                    this.domElement.style.display = 'block';
                    this.domElement.style.left = this.x + 'px';
                    this.domElement.style.top = (this.y + (PIXEL_SIZE * 8)) + 'px';
                    this.domElement.style.width = '90px'; 
                    this.domElement.style.transform = `translate(-50%, -100%) scaleX(${this.direction})`;
                } else {
                    this.domElement.style.display = 'none';
                }

                // 100x50 UI Box
                const boxW = 100;
                const boxH = 50;
                const startX = this.x - (boxW / 2);
                const textY = this.y - 85; 
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(startX, textY - 15, boxW, boxH);
                ctx.strokeStyle = 'rgba(0, 204, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(startX, textY - 15, boxW, boxH);

                if (this.avatarImg) ctx.drawImage(this.avatarImg, startX + 5, textY - 10, 15, 15);
                
                let shortName = this.donorName.substring(0, 6);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px "Courier New"';
                ctx.fillText(shortName, startX + 25, textY + 2);

                const barY = textY + 15;
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 10px "Courier New"';
                ctx.fillText(`LV${this.stateData.level}`, startX + 5, barY + 5);

                const barStartX = startX + 35;
                const barWidth = 60;
                
                const reqExp = 100 + ((this.stateData.level - 1) * 200);
                const expWidth = Math.min(barWidth, (this.stateData.exp / reqExp) * barWidth);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(barStartX, barY - 2, barWidth, 4);
                ctx.fillStyle = '#00ffcc'; 
                ctx.fillRect(barStartX, barY - 2, expWidth, 4);

                const hpWidth = Math.max(0, (this.stateData.hp / this.stateData.maxHp) * barWidth);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(barStartX, barY + 5, barWidth, 4);
                ctx.fillStyle = '#ff0055'; 
                ctx.fillRect(barStartX, barY + 5, hpWidth, 4);

                if (this.state === 'SLEEPING') {
                    ctx.fillStyle = '#aaaaff';
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.fillText('Zzz..', this.x - 15, textY - 20);
                }
            }
        }

        function spawnFood(mappingData, quantity = 1) {
            const foodObj = masterDB.foods ? masterDB.foods[mappingData.foodId] : null;
            if(!foodObj || !foodObj.filename) return;

            const imgUrl = `${LOCAL_FOOD_DB_URL}${foodObj.folder}/${foodObj.filename}`;

            for(let i=0; i<quantity; i++) {
                let fData = {
                    mapId: mappingData.foodId,
                    pt: Number(foodObj.base_pt) || 10,
                    maxPt: Number(foodObj.base_pt) || 10,
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: -100 - (i * 20), 
                    w: 100, 
                    isGrounded: false,
                    domElement: document.createElement('img')
                };

                fData.domElement.src = imgUrl;
                fData.domElement.style.position = 'absolute';
                fData.domElement.style.pointerEvents = 'none';
                fData.domElement.style.zIndex = '40';
                fData.domElement.style.imageRendering = 'pixelated';
                fData.domElement.style.objectFit = 'contain';
                fData.domElement.style.objectPosition = 'center bottom';
                
                fData.domElement.onerror = () => { fData.domElement.style.display = 'none'; };

                document.body.appendChild(fData.domElement);
                foods.push(fData);
            }
        }

        function renderEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                const targetY = canvas.height - 100; 
                
                if (f.y < targetY) {
                    f.y += 6; 
                } else {
                    f.y = targetY;
                    f.isGrounded = true; 
                }
                
                const drawX = f.x - 50;
                const drawY = f.y - 50;
                
                f.domElement.style.left = drawX + 'px';
                f.domElement.style.top = drawY + 'px';
                f.domElement.style.width = '100px';
                f.domElement.style.height = '100px';
                f.domElement.style.clipPath = `inset(0 ${100 - f.w}% 0 0)`;

                if (f.pt <= 0 || f.w <= 0) {
                    if (f.domElement && f.domElement.parentNode) f.domElement.remove();
                    foods.splice(i, 1);
                }
            }

            activeCats.forEach(c => { c.update(); c.draw(); });

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let ft = floatTexts[i];
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 20px "Courier New"';
                ctx.fillText(ft.text, ft.x, ft.y);
                ft.y -= 1.5;
                ft.life--;
                if (ft.life <= 0) floatTexts.splice(i, 1);
            }

            requestAnimationFrame(renderEngine);
        }

        /* =========================================================================
           4. 후원 처리 및 랭킹 시스템
        ========================================================================= */
        function processDonation(donorName, coin, thumbUrl) {
            if (!userData.settings || !userData.settings.foodMappings) return; 

            if (!donorHistory[donorName]) {
                const fixed = (userData.settings.fixedDonors || []).find(d => d.nickname === donorName);
                
                let remaining = 120; 
                let spd = 10 + Math.floor(Math.random() * 40); remaining -= spd;
                let eat = 10 + Math.floor(Math.random() * 40); remaining -= eat;
                let hp = 10 + (remaining * 2); 

                let availableCats = [];
                if (masterDB.cats) {
                    availableCats = Object.keys(masterDB.cats).filter(k => {
                        let cat = masterDB.cats[k];
                        if (!cat.filename || !cat.filename.includes('idle')) return false;
                        if (!cat.filename.includes('_s')) return true;
                        let unlocked = userData.settings.unlocked && userData.settings.unlocked.cats ? userData.settings.unlocked.cats : [];
                        return unlocked.includes(cat.id);
                    });
                }
                let randomCatId = availableCats.length > 0 ? availableCats[Math.floor(Math.random() * availableCats.length)] : null;
                
                // 고정 고양이가 없으면 마스터 DB 기반 랜덤 고양이 배정
                let catId = fixed ? fixed.catId : randomCatId; 
                let customName = fixed ? fixed.customName : donorName;

                donorHistory[donorName] = { 
                    nickname: donorName,
                    thumb: thumbUrl,
                    totalCoin: 0, 
                    catId: catId, 
                    stats: { name: customName, level: 1, exp: 0, speed: spd, eating: eat, maxHp: hp, hp: hp } 
                };
            }
            
            donorHistory[donorName].totalCoin += coin;

            let spawned = false;
            for (let m of userData.settings.foodMappings) {
                if (coin >= m.minCoin && coin <= m.maxCoin) {
                    m.pt = m.pt || (coin * 10); 
                    spawnFood(m, 1);
                    spawned = true;
                    break;
                }
            }
            
            if (!spawned && userData.settings.foodMappings.length > 0) {
                let defaultMap = userData.settings.foodMappings[0];
                defaultMap.pt = defaultMap.pt || 10;
                spawnFood(defaultMap, 1);
            }

            updateRankings();
        }
        function updateRankings() {
            const sortedDonors = Object.values(donorHistory).sort((a, b) => b.totalCoin - a.totalCoin);
            const top3 = sortedDonors.slice(0, 3);
            const top3Nicknames = top3.map(d => d.nickname);

            top3.forEach((donor, index) => {
                const rank = index + 1;
                const existingCat = activeCats.find(c => c.donorName === donor.nickname && c.state !== 'EXIT');
                
                if (existingCat) {
                    existingCat.updateData(donor.totalCoin, rank);
                } else {
                    activeCats.push(new Cat(donor, rank)); 
                }
            });

            activeCats.forEach(cat => {
                if (!top3Nicknames.includes(cat.donorName) && cat.state !== 'EXIT') {
                    cat.exit(); 
                }
            });
        }

        /* =========================================================================
           5. 코어 백엔드 웹소켓 통신
        ========================================================================= */
        let ws = null;
        function initWebSocket() {
            if (ws) { ws.onclose = null; ws.close(); }
            const statusEl = document.getElementById('connection-status');

            try { 
                let targetWsUrl = `ws://127.0.0.1:8340`;
                if (ngrokWs && ngrokWs !== "null" && ngrokWs !== "undefined" && ngrokWs.trim() !== "") {
                    let cleanNgrok = ngrokWs.replace(/\/+$/, "");
                    targetWsUrl = cleanNgrok.replace("https://", "wss://").replace("http://", "ws://");
                    if (!targetWsUrl.startsWith("ws")) targetWsUrl = "wss://" + targetWsUrl;
                } else {
                    const wsPort = urlParams.get('port') || '8340';
                    targetWsUrl = `ws://127.0.0.1:${wsPort}`;
                }
                
                ws = new WebSocket(targetWsUrl); 
            } catch (e) { return; }

            ws.onopen = () => {
                statusEl.innerText = "🟢 시스템 연결 성공";
                statusEl.style.color = "#00ff00";
                
                ws.send(JSON.stringify({ 
                    action: "viewer_init", 
                    payload: { streamer_id: currentUser } 
                }));
            };
        
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.action === "viewer_init_res") {
                    userData.settings = data.data.user_settings || { foodMappings: [], fixedDonors: [] };
                    masterDB = data.data.master_assets || { cats: {}, foods: {} };
                    donorHistory = data.data.donor_history || {};
                    
                    if (Object.keys(donorHistory).length > 0) updateRankings();
                }

                if (data.action === "live_donation") {
                    let isMyChannel = true;
                    if (data.target_broadcaster && currentUser) {
                        const target = String(data.target_broadcaster).toLowerCase();
                        const current = String(currentUser).toLowerCase().replace('@', '');
                        if (target !== current && !target.includes(current) && !current.includes(target)) isMyChannel = false;
                    }
                    if (isMyChannel && userData.settings) {
                        processDonation(data); // 통째로 넘겨 thumb 처리
                    }
                }
            };

            ws.onclose = () => {
                statusEl.innerText = "🔴 서버 연결 끊김 (재접속 대기)";
                statusEl.style.color = "#ff0000";
                setTimeout(initWebSocket, 3000);
            };
        }
        
        initWebSocket();
        requestAnimationFrame(renderEngine);
    </script>
</body>
</html>
