<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냥코구치</title>
    <style>
        /* 기본 레이아웃 및 캔버스 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; position: relative; z-index: 60; pointer-events: none; }
        
        /* 은닉된 상태등 및 외부 저장 버튼 */
        #connection-status { position: absolute; top: 15px; right: 15px; font-size: 14px; color: #00ff00; z-index: 100; text-shadow: 1px 1px 0 #000; cursor: pointer; pointer-events: auto; font-weight: bold; }
        #connection-status:hover { opacity: 0.7; }
        
        #external-save-btn {
            display: none; position: absolute; top: 15px; left: 15px; z-index: 100; pointer-events: auto;
            background: #0055aa; color: white; padding: 10px 15px; border-radius: 8px;
            border: 2px solid #555; cursor: pointer; font-weight: bold; font-size: 14px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #external-save-btn:hover { background: #0077ff; }

        /* 시작 대화창 모달 */
        #start-overlay { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; pointer-events: auto; flex-direction: column; }
        .start-box { background: #222; color: #fff; width: 500px; padding: 30px; border-radius: 12px; border: 3px solid #ffcc00; text-align: center; }
        .start-box input[type="text"] { width: 80%; padding: 12px; font-size: 16px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #555; background: #111; color: #fff; text-align: center; }
        .start-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn-load { background: #0055aa; color: white; }
        .btn-new { background: #aa5500; color: white; }
        #new-game-setup { display: none; margin-top: 25px; border-top: 2px solid #444; padding-top: 20px; text-align: left; }
        .roster-select-row { background: #333; padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; align-items: center; gap: 10px; }

        /* 설정 팝업 모달 */
        #modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; pointer-events: auto; }
        .modal-box { background: #222; color: #fff; width: 700px; max-height: 90vh; border-radius: 12px; border: 4px solid #fff; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .modal-header { font-size: 24px; font-weight: bold; border-bottom: 2px solid #555; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .close-btn { cursor: pointer; color: #ff5555; }
        
        .cat-row { background: #333; padding: 15px; border-radius: 8px; border: 2px solid #444; margin-bottom: 10px; }
        .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-weight: bold; font-size: 18px; color: #00ffcc; }
        
        .stat-group { display: flex; flex-direction: column; gap: 8px; background: #1a1a1a; padding: 12px; border-radius: 6px; border: 1px solid #444; margin-bottom: 10px; }
        .stat-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
        .stat-item input[type=range] { width: 60%; }
        .pts-warning { color: #00ff00; font-size: 11px; margin-top: 5px; text-align: right; font-weight:bold; }

        .mapping-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .mapping-row input { padding: 6px; border-radius: 4px; border: 1px solid #555; background: #111; color: #fff; }
        .mapping-group { display: flex; flex-direction: column; gap: 4px; }
        .mapping-label { font-size: 12px; color: #aaa; }
        
        .btn-add, .btn-remove { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #00aa00; color: white; font-size: 18px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-save:hover { background: #00dd00; }
        
        .sim-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn-sim { background: #444; color: #fff; border: 1px solid #666; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-sim-auto { background: #555; color: #fff; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top:5px; }
        .anim-tools { background: #111; padding: 10px; border-radius: 6px; font-size: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #333; }
        
        /* 파일명 표시용 스타일 */
        .file-name-display { font-size: 10px; color: #ffcc00; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="connection-status" onclick="openModal()">🟢 대기중</div>
    <button id="external-save-btn" onclick="exitGame()">💾 저장 및 메인으로</button>
    <canvas id="gameCanvas"></canvas>

    <!-- 중앙 시작 대화창 -->
    <div id="start-overlay">
        <div class="start-box">
            <h2 style="color:#00ffcc; margin-top:0;">🐈 냥코구치</h2>
            <p style="font-size:13px; color:#aaa;">데이터 저장을 위한 사용자 이름을 입력하세요.</p>
            <input type="text" id="start-username" name="catgame_username_no_autocomplete" autocomplete="off" spellcheck="false" data-lpignore="true" placeholder="등록자 이름 입력">
            <div>
                <button class="start-btn btn-load" onclick="dbLoadGame()">이어하기</button>
                <button class="start-btn btn-new" onclick="dbNewGame()">새로시작</button>
            </div>
            
            <div id="new-game-setup">
                <h3 style="color:#ffcc00; margin-top:0;">출전 고양이 선택 (최대 3마리)</h3>
                <div id="start-cat-list"></div>
                <button onclick="dbStartGame()" style="background:#00aa00; color:#fff; border:none; padding:12px 20px; border-radius:6px; font-size:16px; cursor:pointer; width:100%; margin-top:15px; font-weight:bold;">게임 시작</button>
            </div>
        </div>
    </div>

    <!-- 설정 모달창 -->
    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <span>⚙️ 시스템 제어 콘솔</span>
                <span class="close 지우기-btn" onclick="closeModal()">✖</span>
            </div>
            
            <div id="roster-section">
                <h3>1. 고양이 로스터 및 애니메이션 등록</h3>
                <p style="font-size:12px; color:#ffcc00;">※ 레벨업 시 20포인트가 자동으로 스탯에 랜덤 분배되며, 이곳에서 수동으로 스탯을 재조정할 수 있습니다.</p>
                <div id="cat-anim-list"></div>
            </div>

            <div id="mapping-section">
                <h3>2. 먹이 발동 조건 및 포인트 설정</h3>
                <p style="font-size:12px; color:#aaa; margin-top:-10px;">코인 범위 만족 시 발동. 이미지는 최대 100px로 렌더링되며 우측부터 지워집니다.</p>
                <div id="mapping-list"></div>
                <button class="btn-add" onclick="addMappingRow()">➕ 슬롯 추가</button>
            </div>

            <div id="connection-section">
                <h3>3. 코어 연결망 (WebSocket URL)</h3>
                <input type="text" id="ws-url" value="ws://127.0.0.1:8010" style="width: 100%; padding:10px; border-radius:5px; border:none; background:#111; color:#fff;" autocomplete="off">
            </div>

            <div id="simulator-section">
                <h3 style="color: #ff99ff;">🕹️ 단독 플레이 시뮬레이터</h3>
                <div class="sim-controls" id="sim-btn-group"></div>
                <button class="btn-sim-auto" id="auto-btn" onclick="toggleAutoPlay()">🤖 가상 시청자 봇 가동 (랜덤 자동 투하)</button>
            </div>

            <button class="btn-save" onclick="saveSettings()">💾 시스템 스탯 고정 및 닫기</button>
        </div>
    </div>

    <!-- 커스텀 모달 UI -->
    <div id="sys-msg-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; justify-content:center; align-items:center; pointer-events:auto;">
        <div style="background:#222; border:2px solid #ff3333; padding:20px; border-radius:8px; color:#fff; text-align:center; min-width:300px; max-width:80%;">
            <p id="sys-msg-text" style="font-size:16px; margin-bottom:20px; line-height:1.4; word-break:keep-all;"></p>
            <div id="sys-msg-btns" style="display:flex; justify-content:center; gap:10px;"></div>
        </div>
    </div>

    <script>
        /* =========================================================================
           1. 게임 데이터베이스 및 글로벌 설정
        ========================================================================= */
        const PIXEL_SIZE = 6;
        
        let cats = []; 
        let foods = []; 
        let floatTexts = [];
        
        let currentUser = "";
        let config = {}; 
        let catStates = {}; 
        let ws = null; 
        let mappingImageCache = {};

        // 브라우저 기본 alert, confirm 대체
        let confirmCallback = null;
        function customAlert(msg) {
            document.getElementById('sys-msg-text').innerText = msg;
            document.getElementById('sys-msg-btns').innerHTML = '<button onclick="closeSysMsg()" style="background:#555; color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">확인</button>';
            document.getElementById('sys-msg-overlay').style.display = 'flex';
        }
        function customConfirm(msg, callback) {
            document.getElementById('sys-msg-text').innerText = msg;
            document.getElementById('sys-msg-btns').innerHTML = `
                <button onclick="executeConfirm(true)" style="background:#aa0000; color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">예 (삭제)</button>
                <button onclick="executeConfirm(false)" style="background:#555; color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">아니오</button>
            `;
            confirmCallback = callback;
            document.getElementById('sys-msg-overlay').style.display = 'flex';
        }
        function executeConfirm(result) {
            closeSysMsg();
            if(confirmCallback) confirmCallback(result);
        }
        function closeSysMsg() { document.getElementById('sys-msg-overlay').style.display = 'none'; }

        // 외부 JSON 파일을 비동기로 읽어와 최우선으로 덮어쓰도록 로직 개편
        async function loadMasterConfig() {
            let externalConfig = null;
            try {
                // 브라우저 캐시를 무시하고 깃허브의 최신 스펙을 항상 가져오도록 타임스탬프 추가
                const response = await fetch('./master_config.json?t=' + new Date().getTime());
                if (response.ok) {
                    externalConfig = await response.json();
                }
            } catch (e) {
                console.log("외부 설정 파일이 없거나 로드 실패, 로컬/기본값 사용");
            }

            let saved = localStorage.getItem('catGameMasterConfig');
            
            if (externalConfig) {
                config = externalConfig;
                localStorage.setItem('catGameMasterConfig', JSON.stringify(config));
            } else if (saved) {
                config = JSON.parse(saved);
                config.mappings.forEach(m => { m.pt = Number(m.pt) || 10; });
            } else {
                // 더미 데이터 완전 삭제 및 경량화
                config = { 
                    mappings: [], 
                    wsUrl: "ws://127.0.0.1:8010", 
                    selectedCats: {} 
                };
            }
        }

        /* =========================================================================
           2. 로컬 DB 시뮬레이터 연동
        ========================================================================= */
        function checkUserExist() {
            const name = document.getElementById('start-username').value.trim();
            if(!name) { customAlert("데이터베이스 식별을 위해 이름을 입력해주세요."); return false; }
            return name;
        }

        function dbLoadGame() {
            const name = checkUserExist();
            if(!name) return;
            let db = JSON.parse(localStorage.getItem('catGameDB')) || {};
            if(db[name]) {
                currentUser = name;
                
                // [핵심 수정 구간] 
                // 기존에는 로컬에 저장된 과거의 config가 외부 JSON을 강제 덮어쓰기 하도록 되어 있었습니다.
                // 이 부분을 삭제하여 master_config.json 이 시스템의 유일한 진실 공급원이 되게 만듭니다.
                // config = db[name].config; (삭제됨)
                
                catStates = db[name].catStates;
                
                // [안전망 추가] 마스터 JSON에 새롭게 추가된 고양이가 기존 유저의 로컬 state에 없을 경우 생성
                Object.keys(config.selectedCats).forEach(id => {
                    if(config.selectedCats[id].active && !catStates[id]) {
                        const cfg = config.selectedCats[id];
                        catStates[id] = {
                            name: cfg.meta.name || '새 고양이',
                            level: 1,
                            exp: 0,
                            speed: cfg.speed || 30,
                            eating: cfg.eating || 30,
                            maxHp: 100 + (cfg.stamina || 40),
                            hp: 100 + (cfg.stamina || 40)
                        };
                    }
                });

                document.getElementById('start-overlay').style.display = 'none';
                resumeGame();
            } else {
                customAlert("존재하지 않는 이름입니다. [새로시작]을 통해 프로필을 생성하세요.");
            }
        }

        function dbNewGame() {
            const name = checkUserExist();
            if(!name) return;
            currentUser = name;
            
            let html = '';
            Object.keys(config.selectedCats).forEach(id => {
                const cfg = config.selectedCats[id];
                html += `
                <div class="roster-select-row">
                    <input type="checkbox" class="new-cat-chk" value="${id}" onchange="limitNewCats(this)">
                    <input type="text" id="new-cat-name-${id}" value="${cfg.meta.name}" style="padding:5px; border-radius:4px; border:none; width:120px;" autocomplete="off">
                    <span style="font-size:11px; color:#aaa;">(속도:${cfg.speed} 먹기:${cfg.eating} 체력:${100 + cfg.stamina})</span>
                </div>`;
            });
            document.getElementById('start-cat-list').innerHTML = html;
            document.getElementById('new-game-setup').style.display = 'block';
        }

        function limitNewCats(chk) {
            if(document.querySelectorAll('.new-cat-chk:checked').length > 3) {
                chk.checked = false;
                customAlert("최대 3마리까지만 출전 가능합니다.");
            }
        }

        function dbStartGame() {
            const checks = document.querySelectorAll('.new-cat-chk:checked');
            if(checks.length === 0) { customAlert("최소 1마리를 선택해야 합니다."); return; }
            
            catStates = {};
            
            checks.forEach(chk => {
                const id = chk.value;
                const cfg = config.selectedCats[id];
                const customName = document.getElementById(`new-cat-name-${id}`).value || cfg.meta.name;
                
                cfg.active = true;
                cfg.meta.name = customName;

                catStates[id] = {
                    name: customName,
                    level: 1,
                    exp: 0,
                    speed: cfg.speed,
                    eating: cfg.eating,
                    maxHp: 100 + cfg.stamina,
                    hp: 100 + cfg.stamina
                };
            });
            
            Object.keys(config.selectedCats).forEach(id => {
                if(!catStates[id]) config.selectedCats[id].active = false;
            });
            
            saveToDB();
            document.getElementById('start-overlay').style.display = 'none';
            resumeGame();
        }

        function saveToDB() {
            if(!currentUser) return;
            let db = JSON.parse(localStorage.getItem('catGameDB')) || {};
            db[currentUser] = { config, catStates };
            try {
                localStorage.setItem('catGameDB', JSON.stringify(db));
                localStorage.setItem('catGameMasterConfig', JSON.stringify(config));
            } catch(e) {
                if(!window.quotaAlerted) {
                    customAlert('⚠️ 용량 한도 초과: 등록하신 GIF 이미지가 너무 큽니다. 데이터가 온전히 저장되지 않을 수 있습니다.');
                    window.quotaAlerted = true;
                }
            }
        }

        function exitGame() {
            saveToDB();
            cats.forEach(c => c.domElement.remove());
            cats = [];
            // [수정] 게임 종료 시 생성되어 있던 먹이의 DOM 엘리먼트도 함께 정리합니다.
            foods.forEach(f => { if(f.domElement && f.domElement.parentNode) f.domElement.remove(); });
            foods = [];
            if(ws) { ws.onclose = null; ws.close(); ws = null; }
            closeModal();
            document.getElementById('new-game-setup').style.display = 'none';
            document.getElementById('start-overlay').style.display = 'flex';
            document.getElementById('external-save-btn').style.display = 'none';
            document.getElementById('connection-status').innerText = '🟢 대기중';
        }

        function resumeGame() {
            const urlParams = new URLSearchParams(window.location.search);
            
            const wsParam = urlParams.get('ws');
            if (wsParam) {
                config.wsUrl = wsParam;
            } else {
                const urlPort = urlParams.get('port');
                if (urlPort) config.wsUrl = `ws://127.0.0.1:${urlPort}`;
            }
            
            mappingImageCache = {};
            config.mappings.forEach(m => {
                if(m.image) {
                    let img = new Image();
                    img.src = m.image;
                    mappingImageCache[m.id] = img;
                }
            });

            document.getElementById('external-save-btn').style.display = 'block';
            spawnCats();
            initWebSocket();
        }

        /* =========================================================================
           3. 설정 모달창
        ========================================================================= */
        const modal = document.getElementById('modal-overlay');
        function openModal() {
            if(!currentUser) return; 
            renderModal();
            modal.style.display = 'flex';
        }
        function closeModal() { modal.style.display = 'none'; }

        function addNewCat() {
            const newId = 'custom_' + Date.now();
            const defaultName = '새 고양이';
            const fixedSpeed = 30;
            const fixedEating = 30;
            const fixedStamina = 40;

            const meta = { name: defaultName }; 
            
            config.selectedCats[newId] = { active: false, speed: fixedSpeed, eating: fixedEating, stamina: fixedStamina, anims: {}, meta: meta };
            catStates[newId] = {
                name: defaultName,
                level: 1,
                exp: 0,
                speed: fixedSpeed,
                eating: fixedEating,
                maxHp: 100 + fixedStamina,
                hp: 100 + fixedStamina
            };
            
            saveToDB();
            renderModal();
        }

        function toggleCatActive(id, isActive) {
            const activeCount = Object.values(config.selectedCats).filter(c => c.active).length;
            if (isActive && activeCount >= 3) {
                customAlert("최대 3마리까지만 출전 가능합니다.");
                document.getElementById(`chk_${id}`).checked = false;
                return;
            }
            config.selectedCats[id].active = isActive;
            saveToDB();
            spawnCats();
        }

        function updateCatName(id, newName) {
            if(catStates[id]) catStates[id].name = newName;
            if(config.selectedCats[id] && config.selectedCats[id].meta) config.selectedCats[id].meta.name = newName;
            saveToDB();
        }

        function deleteCat(id) {
            if(Object.keys(config.selectedCats).length <= 1) {
                customAlert("최소 1마리의 고양이는 시스템에 남아있어야 합니다.");
                return;
            }
            customConfirm("이 고양이를 명단에서 완전히 삭제하시겠습니까? (복구 불가)", function(result) {
                if(result) {
                    delete config.selectedCats[id];
                    if(catStates[id]) delete catStates[id];
                    saveToDB();
                    renderModal();
                    spawnCats();
                }
            });
        }

        function updateStats(id) {
            const spd = parseInt(document.getElementById(`spd_${id}`).value) || 0;
            const eat = parseInt(document.getElementById(`eat_${id}`).value) || 0;
            const stm = parseInt(document.getElementById(`stm_${id}`).value) || 0;
            const total = spd + eat + stm;
            
            document.getElementById(`val_spd_${id}`).innerText = spd;
            document.getElementById(`val_eat_${id}`).innerText = eat;
            document.getElementById(`val_stm_${id}`).innerText = stm;

            const state = catStates[id];
            const maxLimit = state ? 100 + (state.level - 1) * 20 : 100;

            const warn = document.getElementById(`warn_${id}`);
            if(total > maxLimit) {
                warn.innerText = `⚠️ 포인트 초과! (${total}/${maxLimit}) 저장이 거부됩니다.`;
                warn.style.color = '#ff3333';
            } else {
                warn.innerText = `남은 여유 포인트: ${maxLimit - total}`;
                warn.style.color = '#00ff00';
            }
        }

        function renderModal() {
            const rosterDiv = document.getElementById('cat-anim-list');
            rosterDiv.innerHTML = '<button onclick="addNewCat()" style="background:#0055aa; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; margin-bottom:15px; font-weight:bold;">➕ 새 고양이 추가</button>';
            
            Object.keys(config.selectedCats).forEach(id => {
                const cfg = config.selectedCats[id];
                const state = catStates[id];
                
                const maxLimit = state ? 100 + (state.level - 1) * 20 : 100;
                const currentSpd = state ? state.speed : (cfg.speed || 30);

        /* =========================================================================
           4. 게임 물리엔진 및 렌더러
        ========================================================================= */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let oldW = window.innerWidth;
        let oldH = window.innerHeight;
        
        function resize() { 
            const newW = window.innerWidth; 
            const newH = window.innerHeight; 
            
            if (cats && cats.length > 0) {
                const wRatio = oldW ? (newW / oldW) : 1;
                cats.forEach(c => {
                    c.x *= wRatio;
                    c.y = newH - 100;
                });
            }
            if (foods && foods.length > 0) {
                const wRatio = oldW ? (newW / oldW) : 1;
                foods.forEach(f => {
                    f.x *= wRatio;
                    if (f.isGrounded) {
                        f.y = newH - 100;
                    }
                });
            }

            canvas.width = newW; 
            canvas.height = newH; 
            oldW = newW;
            oldH = newH;
        }
        window.addEventListener('resize', resize);
        resize();

        class Cat {
            constructor(id) {
                this.id = id;
                this.cfg = config.selectedCats[id];
                this.stateData = catStates[id];
                this.info = this.cfg.meta; 
                
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = canvas.height - 100;
                this.state = 'IDLE'; 
                this.tailFrame = 0;
                this.targetFood = null;
                this.direction = 1; 
                this.hp = this.stateData.hp;

                this.wanderTimer = Math.random() * 3000 + 6000; 
                this.wanderX = null;

                this.domElement = document.createElement('img');
                this.domElement.style.position = 'absolute';
                this.domElement.style.pointerEvents = 'none';
                this.domElement.style.transform = 'translate(-50%, -100%)';
                this.domElement.style.zIndex = '50';
                this.domElement.style.imageRendering = 'pixelated'; 
                this.domElement.style.display = 'none';
                document.body.appendChild(this.domElement);
                this.currentAnimSrc = null;
            }

            update() {
                this.speedPerFrame = this.stateData.speed / 60;
                this.eatPerFrame = this.stateData.eating / 60;

                if (this.hp <= 0) this.state = 'SLEEPING';
                
                if (this.state === 'SLEEPING') {
                    this.hp += (this.stateData.maxHp * 0.03) / 60; 
                    if (this.hp >= this.stateData.maxHp * 0.3) {
                        this.state = 'IDLE'; 
                    }
                    return; 
                }

                let availableFoods = foods.filter(f => f.isGrounded);
                if ((this.state === 'IDLE' || this.state === 'MOVE' || this.state === 'WANDER') && availableFoods.length > 0) {
                    availableFoods.sort((a, b) => Math.abs(a.x - this.x) - Math.abs(b.x - this.x));
                    this.targetFood = availableFoods[0];
                    this.state = 'MOVE';
                } else if (availableFoods.length === 0 && this.state === 'MOVE') {
                    this.state = 'IDLE';
                    this.targetFood = null;
                }

                if (this.state === 'IDLE') {
                    this.hp = Math.min(this.stateData.maxHp, this.hp + (this.stateData.maxHp * 0.02) / 60);
                    this.wanderTimer--;
                    if (this.wanderTimer <= 0) {
                        this.wanderX = Math.random() * (canvas.width - 100) + 50;
                        this.state = 'WANDER';
                        this.wanderTimer = Math.random() * 3000 + 6000; 
                    }
                }

                if (this.state === 'WANDER') {
                    const dist = this.wanderX - this.x;
                    if (Math.abs(dist) < 5) {
                        this.state = 'IDLE';
                    } else {
                        this.direction = dist > 0 ? 1 : -1;
                        this.x += Math.sign(dist) * this.speedPerFrame;
                        this.hp -= 1 / 60; 
                    }
                }

                if (this.state === 'MOVE' && this.targetFood) {
                    if (!this.targetFood.isGrounded) {
                        this.state = 'IDLE';
                        this.targetFood = null;
                    } else {
                        const dist = this.targetFood.x - this.x;
                        if (Math.abs(dist) < 5) {
                            this.state = 'EATING';
                        } else {
                            this.direction = dist > 0 ? 1 : -1;
                            this.x += Math.sign(dist) * this.speedPerFrame;
                            this.hp -= 1 / 60; 
                        }
                    }
                }

                if (this.state === 'EATING' && this.targetFood) {
                    if (this.targetFood.pt <= 0) {
                        this.state = 'IDLE';
                        this.targetFood = null;
                    } else {
                        let eatAmt = Math.min(this.eatPerFrame, this.targetFood.pt);
                        this.targetFood.pt -= eatAmt;
                        this.hp = Math.min(this.stateData.maxHp, this.hp + eatAmt);
                        this.stateData.exp += eatAmt;
                        this.hp -= 1 / 60; 

                        this.targetFood.w = Math.max(0, (this.targetFood.pt / this.targetFood.maxPt) * 100);

                        const reqExp = 100 + ((this.stateData.level - 1) * 200);
                        if (this.stateData.exp >= reqExp) {
                            this.stateData.level++;
                            this.stateData.exp -= reqExp;
                            
                            for(let i=0; i<20; i++) {
                                let r = Math.floor(Math.random() * 3);
                                if(r === 0) this.stateData.speed += 1;
                                else if(r === 1) this.stateData.eating += 1;
                                else this.stateData.maxHp += 1;
                            }
                            this.hp = this.stateData.maxHp; 

                            floatTexts.push({ text: "✨LEVEL UP!✨", x: this.x, y: this.y - 80, life: 100, color: '#00ffcc' });
                        }
                    }
                }
            }

            draw() {
                const anims = this.cfg.anims || {};
                let targetAnim = anims[this.state === 'WANDER' ? 'MOVE' : this.state];
                
                if (!targetAnim && this.state !== 'SLEEPING') {
                    targetAnim = anims['IDLE'] || anims['MOVE'] || anims['EATING'];
                }

                if (targetAnim) {
                    if (this.currentAnimSrc !== targetAnim) {
                        this.domElement.src = targetAnim;
                        this.currentAnimSrc = targetAnim;
                    }
                    this.domElement.style.display = 'block';
                    this.domElement.style.left = this.x + 'px';
                    this.domElement.style.top = (this.y + (PIXEL_SIZE * 8)) + 'px';
                    this.domElement.style.width = '90px'; 
                    this.domElement.style.transform = `translate(-50%, -100%) scaleX(${this.direction})`;
                } else {
                    this.domElement.style.display = 'none';
                }

                const levelText = `LV${this.stateData.level}. ${this.stateData.name}`;
                ctx.font = 'bold 15px "Courier New"';
                const textWidth = ctx.measureText(levelText).width;
                
                const barWidth = 50; 
                
                const uiMaxWidth = Math.max(textWidth, barWidth);
                const startX = this.x - (uiMaxWidth / 2);
                
                const textY = this.y - 85; 
                const expGaugeY = textY + 10;
                const hpGaugeY = expGaugeY + 8;

                const textOffsetX = startX + (uiMaxWidth - textWidth) / 2;
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'white';
                ctx.strokeText(levelText, textOffsetX, textY);
                ctx.fillStyle = 'black';
                ctx.fillText(levelText, textOffsetX, textY);
                
                const gaugeStartX = startX + (uiMaxWidth - barWidth) / 2;
                
                const reqExp = 100 + ((this.stateData.level - 1) * 200);
                const expWidth = Math.min(barWidth, (this.stateData.exp / reqExp) * barWidth);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(gaugeStartX, expGaugeY, barWidth, 6);
                ctx.fillStyle = '#ffcc00'; 
                ctx.fillRect(gaugeStartX, expGaugeY, expWidth, 6);

                const hpWidth = Math.max(0, (this.hp / this.stateData.maxHp) * barWidth);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(gaugeStartX, hpGaugeY, barWidth, 6);
                ctx.fillStyle = '#ff3333'; 
                ctx.fillRect(gaugeStartX, hpGaugeY, hpWidth, 6);

                if (this.state === 'SLEEPING' && !targetAnim) {
                    ctx.fillStyle = '#aaaaff';
                    ctx.fillText('Zzz..', this.x - 15, textY - 15);
                }
            }
        }

        function spawnCats() {
            if(cats && cats.length > 0) {
                cats.forEach(c => { if(c.domElement) c.domElement.remove(); });
            }
            cats = [];
            Object.keys(config.selectedCats).forEach(id => {
                if(config.selectedCats[id].active) cats.push(new Cat(id));
            });
        }

        function spawnFood(mappingData, quantity = 1) {
            for(let i=0; i<quantity; i++) {
                // [수정] 먹이 객체 생성 시 Canvas 엔진 대신 사용할 DOM <img> 엘리먼트를 함께 생성하여 부착
                let fData = {
                    mapId: mappingData.id,
                    pt: Number(mappingData.pt) || 10,
                    maxPt: Number(mappingData.pt) || 10,
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: -100 - (i * 20), 
                    w: 100, 
                    h: 100,
                    isGrounded: false,
                    domElement: document.createElement('img'),
                    useCanvasFallback: false
                };

                if (mappingData.image) {
                    fData.domElement.src = mappingData.image;
                    fData.domElement.style.position = 'absolute';
                    fData.domElement.style.pointerEvents = 'none';
                    fData.domElement.style.zIndex = '40';
                    fData.domElement.style.imageRendering = 'pixelated';
                    fData.domElement.style.objectFit = 'cover';
                    fData.domElement.style.objectPosition = 'left top';
                    document.body.appendChild(fData.domElement);
                } else {
                    fData.useCanvasFallback = true;
                }

                foods.push(fData);
            }
        }

        function renderEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                const targetY = canvas.height - 100; 
                
                if (f.y < targetY) {
                    f.y += 6; 
                } else {
                    f.y = targetY;
                    f.isGrounded = true; 
                }
                
                // [수정] Canvas drawImage를 완전히 제거하고 <img> 태그의 위치 및 너비를 실시간 제어
                const drawX = f.x - 50;
                const drawY = f.y - 50;
                const dWidth = f.w; 
                
                if (!f.useCanvasFallback) {
                    f.domElement.style.left = drawX + 'px';
                    f.domElement.style.top = drawY + 'px';
                    f.domElement.style.width = dWidth + 'px';
                    f.domElement.style.height = '100px';
                } else {
                    if (dWidth > 0) {
                        ctx.fillStyle = '#000'; 
                        ctx.fillRect(drawX - 2, drawY - 2, dWidth + 4, 104);
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(drawX, drawY, dWidth, 100);
                    }
                }

                if (f.pt <= 0 || f.w <= 0) {
                    if (f.domElement && f.domElement.parentNode) f.domElement.remove();
                    foods.splice(i, 1);
                }
            }

            cats.forEach(c => { c.update(); c.draw(); });

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let ft = floatTexts[i];
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 20px "Courier New"';
                ctx.fillText(ft.text, ft.x, ft.y);
                ft.y -= 1.5;
                ft.life--;
                if (ft.life <= 0) floatTexts.splice(i, 1);
            }

            if(Date.now() % 1000 < 16) saveToDB();
            
            Object.keys(catStates).forEach(id => {
                const cObj = cats.find(c => c.id === id);
                if(cObj) { catStates[id].hp = cObj.hp; }
            });

            requestAnimationFrame(renderEngine);
        }

        /* =========================================================================
           5. 시스템 통신 (WebSocket)
        ========================================================================= */
        function initWebSocket() {
            if (ws) { ws.onclose = null; ws.close(); }
            const statusEl = document.getElementById('connection-status');
            statusEl.innerText = "🟡 대기중";
            statusEl.style.color = "#ffcc00";

            try { ws = new WebSocket(config.wsUrl); } catch (e) { return; }

            ws.onopen = () => {
                statusEl.innerText = "🟢 대기중";
                statusEl.style.color = "#00ff00";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if(data.action === "chat_event") {
                    const isGift = data.is_gift;
                    const coinValue = parseInt(data.coin_value) || 0;
                    const giftCount = parseInt(data.gift_count) || 1;

                    if (isGift) {
                        for(let m of config.mappings) {
                            const minC = parseInt(m.minCoin);
                            const maxC = parseInt(m.maxCoin);
                            let 개Matched = true;
                            
                            if (!isNaN(minC) && coinValue < minC) coinMatched = false;
                            if (!isNaN(maxC) && coinValue > maxC) coinMatched = false;
                            if (isNaN(minC) && isNaN(maxC)) coinMatched = false;

                            if(coinMatched) {
                                spawnFood(m, giftCount);
                                break; 
                            }
                        }
                    }
                }
            };

            ws.onclose = () => {
                statusEl.innerText = "🔴 대기중";
                statusEl.style.color = "#ff0000";
                setTimeout(initWebSocket, 3000);
            };
        }

        (async function initSystem() {
            await loadMasterConfig();
            renderEngine();
        })();

    </script>
</body>
</html>
