<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배고파냥 - STREAMER CONTROLLER</title>
    <style>
        body { background: #0a0e17; color: #e0e6ed; font-family: 'Courier New', Courier, monospace; padding: 20px; line-height: 1.6; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #131a26; padding: 30px; border-radius: 12px; border: 3px solid #0066cc; box-shadow: 0 0 20px rgba(0, 102, 204, 0.3); }
        
        h1 { color: #00ccff; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-top: 0; text-shadow: 0 0 5px rgba(0,204,255,0.5); }
        h3 { color: #fff; margin-bottom: 15px; }

        .section { background: #1a2332; padding: 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #2a3749; display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { padding: 10px 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; background: #004488; color: white; transition: all 0.2s; font-family: inherit; }
        .btn:hover { background: #0066cc; transform: translateY(-2px); }
        .btn-success { background: #00aa55; }
        .btn-success:hover { background: #00cc66; }
        .btn-danger { background: #aa0033; }
        .btn-danger:hover { background: #cc0044; }

        input[type="text"], input[type="number"], select { padding: 12px; background: #080c13; color: #00ffcc; border: 1px solid #004488; border-radius: 5px; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; box-sizing: border-box; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: #00ccff; box-shadow: 0 0 8px rgba(0, 204, 255, 0.3); }

        /* Login Area */
        #login-area { text-align: center; padding: 40px 20px; }
        #login-area input { max-width: 300px; text-align: center; margin-bottom: 20px; display: inline-block; }

        /* Fixed Donor Area */
        .fixed-donor-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; background: #080c13; padding: 15px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #2a3749; align-items: center; }
        .fixed-list { margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .fixed-item { display: flex; justify-content: space-between; background: #111; padding: 10px; border-radius: 4px; margin-bottom: 5px; border-left: 3px solid #00ffcc; }

        /* Food Mapping Area */
        .mapping-row { display: flex; align-items: center; gap: 10px; background: #080c13; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #2a3749;}
        .mapping-row select { flex: 2; }
        .mapping-row .coin-input { display: flex; align-items: center; gap: 5px; flex: 3; }
        .mapping-row input { width: 80px; text-align: center; }

        /* Result Area */
        .result-panel { background: #000; padding: 20px; border-radius: 8px; border: 1px solid #00aa55; text-align: center; margin-top: 20px; }
        .url-box { background: #131a26; padding: 15px; border-radius: 5px; font-weight: bold; color: #00ffcc; word-break: break-all; margin: 15px 0; border: 1px dashed #00aa55; font-size: 14px;}
        
        .toast { position: fixed; top: 20px; right: 20px; background: #333; color: #fff; padding: 15px 20px; border-radius: 5px; border-left: 5px solid #00ffcc; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.error { border-left-color: #ff0055; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="container">
        <h1>🐾 배고파냥 - STREAMER SETTING</h1>
        
        <!-- 1. 로그인 구역 -->
        <div id="login-area" class="section active">
            <h3>1. 방송 계정 연동</h3>
            <p style="color: #8892b0; font-size: 14px;">플랫폼의 고유 아이디(예: @yoom1111)를 입력하여 세션을 시작하세요.</p>
            <input type="text" id="streamer-id" placeholder="@스트리머ID 입력">
            <br>
            <button class="btn btn-success" style="font-size: 16px; padding: 12px 30px;" onclick="doLogin()">데이터 로드 및 세팅 시작</button>
        </div>

        <!-- 2. 대시보드 구역 -->
        <div id="dashboard-area" style="display:none;">
            <div style="background: #080c13; padding: 10px 20px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #00ccff;">
                현재 접속 계정: <b id="display-user-id" style="color:#00ffcc; font-size: 18px;"></b>
            </div>

            <!-- 먹이 맵핑 -->
            <div class="section active">
                <h3>2. 후원 먹이 코인 맵핑</h3>
                <p style="color: #8892b0; font-size: 12px;">시청자가 후원한 코인의 범위(Min~Max)에 따라 어떤 먹이가 떨어질지 설정하세요.</p>
                
                <div id="mapping-container"></div>
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="addMappingRow()">➕ 새로운 조건 추가하기</button>
            </div>

            <!-- 고정 후원자 지정 -->
            <div class="section active">
                <h3>3. 열혈 팬(VIP) 전용 고양이 고정 등록</h3>
                <p style="color: #8892b0; font-size: 12px;">특정 닉네임의 후원자에게는 랜덤 고양이가 아닌, 지정된 고양이와 특별한 이름을 고정 부여합니다.</p>
                
                <div class="fixed-donor-row">
                    <input type="text" id="vip-nickname" placeholder="후원자 닉네임 (정확히 입력)">
                    <select id="vip-cat-select">
                        <!-- JS에서 마스터 에셋 기반 렌더링 -->
                    </select>
                    <input type="text" id="vip-custom-name" placeholder="표시할 고양이 이름">
                    <button class="btn btn-success" onclick="addFixedDonor()">등록</button>
                </div>

                <div class="fixed-list" id="fixed-donor-list">
                    <!-- 등록된 VIP 목록 렌더링 -->
                </div>
            </div>

            <!-- 저장 및 URL 발급 -->
            <button class="btn btn-success" style="width: 100%; font-size: 20px; padding: 15px;" onclick="saveAndGenerate()">💾 로컬 서버 설정 저장 및 송출용 URL 발급</button>

            <div id="result-area" class="result-panel" style="display: none;">
                <h3 style="color:#00ffcc; margin-top:0;">✅ 모든 설정이 저장되었습니다!</h3>
                <div class="url-box" id="final-url"></div>
                <button class="btn" onclick="copyUrl()">📋 URL 복사하기</button>
                <button class="btn btn-danger" onclick="window.open(document.getElementById('final-url').innerText, '_blank')">🚀 뷰어 새창 열기 테스트</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // 1. Mock DB (마스터 데이터를 읽어왔다고 가정)
        // ============================================================================
        const masterDB = {
            "cats": {
                "calico": { "id": "calico", "name": "삼색이" },
                "cheese": { "id": "cheese", "name": "치즈냥" },
                "black": { "id": "black", "name": "까망이" }
            },
            "foods": {
                "f1": { "id": "f1", "name": "멸치" },
                "f2": { "id": "f2", "name": "참치캔" },
                "f3": { "id": "f3", "name": "최고급 연어" }
            }
        };

        let currentUser = "";
        let mappingCount = 0;
        let fixedDonors = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = (isError ? "❌ " : "✅ ") + msg;
            toast.className = `toast show ${isError ? 'error' : ''}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function doLogin() {
            const id = document.getElementById('streamer-id').value.trim();
            if(!id) return showToast('스트리머 ID를 입력해주세요.', true);
            
            currentUser = id;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('dashboard-area').style.display = 'block';
            document.getElementById('display-user-id').innerText = currentUser;

            initSelectors();
            addMappingRow();
            showToast('데이터 로드 완료! 세팅을 진행해주세요.');
        }

        function initSelectors() {
            const catSelect = document.getElementById('vip-cat-select');
            catSelect.innerHTML = '<option value="">-- 고양이 선택 --</option>';
            Object.values(masterDB.cats).forEach(cat => {
                catSelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
        }

        function addMappingRow() {
            mappingCount++;
            const container = document.getElementById('mapping-container');
            const rowId = `map-row-${mappingCount}`;
            
            let foodOptions = `<option value="">-- 드랍될 먹이 선택 --</option>`;
            Object.values(masterDB.foods).forEach(f => {
                foodOptions += `<option value="${f.id}">${f.name}</option>`;
            });

            const row = document.createElement('div');
            row.className = 'mapping-row';
            row.id = rowId;
            row.innerHTML = `
                <select class="map-food">${foodOptions}</select>
                <div class="coin-input">
                    <span style="color:#aaa; font-size:12px;">코인</span>
                    <input type="number" class="map-min" placeholder="Min" min="0">
                    <span style="color:#aaa;">~</span>
                    <input type="number" class="map-max" placeholder="Max" min="0">
                </div>
                <button class="btn btn-danger" style="padding: 10px;" onclick="document.getElementById('${rowId}').remove()">X</button>
            `;
            container.appendChild(row);
        }

        function addFixedDonor() {
            const nick = document.getElementById('vip-nickname').value.trim();
            const catId = document.getElementById('vip-cat-select').value;
            const customName = document.getElementById('vip-custom-name').value.trim();

            if(!nick || !catId || !customName) return showToast('모든 정보를 입력해주세요.', true);
            
            // 중복 확인
            if(fixedDonors.find(d => d.nickname === nick)) {
                return showToast('이미 등록된 닉네임입니다.', true);
            }

            fixedDonors.push({ nickname: nick, catId: catId, customName: customName });
            renderFixedDonors();
            
            // 초기화
            document.getElementById('vip-nickname').value = '';
            document.getElementById('vip-cat-select').value = '';
            document.getElementById('vip-custom-name').value = '';
            showToast(`${nick} 님의 고정 고양이가 등록되었습니다.`);
        }

        function removeFixedDonor(nick) {
            fixedDonors = fixedDonors.filter(d => d.nickname !== nick);
            renderFixedDonors();
        }

        function renderFixedDonors() {
            const list = document.getElementById('fixed-donor-list');
            list.innerHTML = '';
            fixedDonors.forEach(d => {
                const catName = masterDB.cats[d.catId].name;
                list.innerHTML += `
                    <div class="fixed-item">
                        <div>
                            <b style="color:#ffcc00;">[${d.nickname}]</b> 
                            <span style="color:#aaa; font-size:12px; margin-left:10px;">🐈 ${catName} / 이름: ${d.customName}</span>
                        </div>
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="removeFixedDonor('${d.nickname}')">삭제</button>
                    </div>
                `;
            });
        }

        function saveAndGenerate() {
            const mappings = [];
            const rows = document.querySelectorAll('.mapping-row');
            let mappingValid = true;

            rows.forEach(row => {
                const foodId = row.querySelector('.map-food').value;
                const minC = parseInt(row.querySelector('.map-min').value);
                const maxC = parseInt(row.querySelector('.map-max').value);
                if(!foodId) { mappingValid = false; return; }
                mappings.push({ foodId: foodId, minCoin: isNaN(minC) ? 0 : minC, maxCoin: isNaN(maxC) ? 999999 : maxC });
            });

            if(!mappingValid || mappings.length === 0) return showToast('먹이 맵핑 조건을 입력해주세요.', true);

            // 로컬 서버로 전송할 페이로드 (M_begopanyang 에 웹소켓 전송되는 로직 대체)
            const payload = {
                streamer_id: currentUser,
                settings: {
                    foodMappings: mappings,
                    fixedDonors: fixedDonors // VIP 지정 목록 추가됨
                }
            };
            console.log("로컬 서버로 전송될 페이로드:", payload);

            const baseUrl = window.location.origin + window.location.pathname.replace('User_Controller.html', '');
            document.getElementById('final-url').innerText = `${baseUrl}Viewer.html?user=${encodeURIComponent(currentUser)}`;
            document.getElementById('result-area').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            showToast('설정이 성공적으로 저장되었습니다!');
        }

        function copyUrl() {
            navigator.clipboard.writeText(document.getElementById('final-url').innerText);
            showToast('URL이 복사되었습니다.');
        }
    </script>
</body>
</html>
