<!-- ... existing code ... -->
            <!-- 저장 및 URL 발급 -->
            <button class="btn btn-success" style="width: 100%; font-size: 20px; padding: 15px;" onclick="saveAndGenerate()">💾 로컬 서버 설정 저장 및 송출용 URL 발급</button>

            <div id="result-area" class="result-panel" style="display: none;">
                <h3 style="color:#00ffcc; margin-top:0;">✅ 모든 설정이 저장되었습니다!</h3>
                <div class="url-box" id="final-url"></div>
                <button class="btn" onclick="copyUrl()">📋 URL 복사하기</button>
                <button class="btn btn-danger" onclick="window.open(document.getElementById('final-url').innerText, '_blank')">🚀 뷰어 새창 열기 테스트</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // 1. 상태 변수 및 웹소켓 설정 (목업 제거 및 실제 통신 규격 적용)
        // ============================================================================
        let masterDB = { cats: {}, foods: {} };
        let currentUser = "";
        let mappingCount = 0;
        let fixedDonors = [];
        let ws = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = (isError ? "❌ " : "✅ ") + msg;
            toast.className = `toast show ${isError ? 'error' : ''}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ============================================================================
        // 2. 로그인 및 데이터 로드 (웹소켓 IN)
        // ============================================================================
        function doLogin() {
            const id = document.getElementById('streamer-id').value.trim();
            if(!id) return showToast('스트리머 ID를 입력해주세요.', true);
            
            currentUser = id;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('dashboard-area').style.display = 'block';
            document.getElementById('display-user-id').innerText = currentUser;

            initWebSocket(); // 로그인 성공 시 로컬 서버 접속 및 기존 데이터 호출
        }

        function initWebSocket() {
            if(ws) ws.close();
            
            try {
                ws = new WebSocket("ws://127.0.0.1:8001");
            } catch(e) {
                showToast("로컬 서버 연결에 실패했습니다.", true);
                return;
            }

            ws.onopen = () => {
                showToast('🟢 로컬 DB 서버 연동 완료. 데이터를 불러옵니다.');
                // M_begopanyang 에 마스터 및 내 데이터 조회 요청 푸시
                ws.send(JSON.stringify({ action: "load_db", payload: {} }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // DB 조회 응답 수신
                if (data.action === "load_db_res") {
                    const db = data.data;
                    
                    // 1. 마스터 에셋 (고양이/먹이 목록) 동기화
                    if(db.master_assets) {
                        masterDB = db.master_assets;
                        initSelectors(); // 셀렉트 박스 렌더링
                    }

                    // 2. 내 스트리머 계정의 기존 설정(DB) 복원 로직
                    if(db.user_data && db.user_data[currentUser]) {
                        const userSettings = db.user_data[currentUser].settings || {};
                        
                        // 먹이 맵핑 UI 복원
                        document.getElementById('mapping-container').innerHTML = ''; 
                        if(userSettings.foodMappings && userSettings.foodMappings.length > 0) {
                            userSettings.foodMappings.forEach(m => addMappingRow(m));
                        } else {
                            addMappingRow();
                        }

                        // VIP 고정 후원자 UI 복원
                        if(userSettings.fixedDonors) {
                            fixedDonors = userSettings.fixedDonors;
                            renderFixedDonors();
                        }
                        showToast('기존 세팅 데이터를 성공적으로 불러왔습니다!');
                    } else {
                        // DB에 없는 신규 유저일 경우
                        document.getElementById('mapping-container').innerHTML = '';
                        addMappingRow();
                        showToast('신규 유저입니다. 세팅을 진행해주세요.');
                    }
                }

                // 저장 완료 응답 수신
                if (data.action === "save_user_data_res") {
                    showToast('설정이 로컬 서버에 안전하게 저장되었습니다!');
                }
            };

            ws.onclose = () => {
                showToast('🔴 로컬 서버와 연결이 끊어졌습니다.', true);
            };
        }

        // ============================================================================
        // 3. UI 렌더링 및 제어
        // ============================================================================
        function initSelectors() {
            const catSelect = document.getElementById('vip-cat-select');
            catSelect.innerHTML = '<option value="">-- 고양이 선택 --</option>';
            Object.values(masterDB.cats).forEach(cat => {
                catSelect.innerHTML += `<option value="${cat.id}">${cat.default_name || cat.name}</option>`;
            });
        }

        function addMappingRow(existingData = null) {
            mappingCount++;
            const container = document.getElementById('mapping-container');
            const rowId = `map-row-${mappingCount}`;
            
            let foodOptions = `<option value="">-- 드랍될 먹이 선택 --</option>`;
            Object.values(masterDB.foods).forEach(f => {
                const isSelected = (existingData && existingData.foodId === f.id) ? 'selected' : '';
                foodOptions += `<option value="${f.id}" ${isSelected}>${f.name}</option>`;
            });

            // 기존 데이터가 있으면 채워넣고, 없으면 빈 칸
            const minVal = existingData ? existingData.minCoin : '';
            const maxVal = existingData ? existingData.maxCoin : '';

            const row = document.createElement('div');
            row.className = 'mapping-row';
            row.id = rowId;
            row.innerHTML = `
                <select class="map-food">${foodOptions}</select>
                <div class="coin-input">
                    <span style="color:#aaa; font-size:12px;">코인</span>
                    <input type="number" class="map-min" placeholder="Min" min="0" value="${minVal}">
                    <span style="color:#aaa;">~</span>
                    <input type="number" class="map-max" placeholder="Max" min="0" value="${maxVal}">
                </div>
                <button class="btn btn-danger" style="padding: 10px;" onclick="document.getElementById('${rowId}').remove()">X</button>
            `;
            container.appendChild(row);
        }

        function addFixedDonor() {
            const nick = document.getElementById('vip-nickname').value.trim();
            const catId = document.getElementById('vip-cat-select').value;
            const customName = document.getElementById('vip-custom-name').value.trim();

            if(!nick || !catId || !customName) return showToast('모든 정보를 입력해주세요.', true);
            
            if(fixedDonors.find(d => d.nickname === nick)) return showToast('이미 등록된 닉네임입니다.', true);

            fixedDonors.push({ nickname: nick, catId: catId, customName: customName });
            renderFixedDonors();
            
            document.getElementById('vip-nickname').value = '';
            document.getElementById('vip-cat-select').value = '';
            document.getElementById('vip-custom-name').value = '';
            showToast(`${nick} 님의 고정 고양이가 등록되었습니다.`);
        }

        function removeFixedDonor(nick) {
            fixedDonors = fixedDonors.filter(d => d.nickname !== nick);
            renderFixedDonors();
        }

        function renderFixedDonors() {
            const list = document.getElementById('fixed-donor-list');
            list.innerHTML = '';
            fixedDonors.forEach(d => {
                const catObj = masterDB.cats[d.catId];
                const catName = catObj ? (catObj.default_name || catObj.name) : '알수없음';
                list.innerHTML += `
                    <div class="fixed-item">
                        <div>
                            <b style="color:#ffcc00;">[${d.nickname}]</b> 
                            <span style="color:#aaa; font-size:12px; margin-left:10px;">🐈 ${catName} / 이름: ${d.customName}</span>
                        </div>
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="removeFixedDonor('${d.nickname}')">삭제</button>
                    </div>
                `;
            });
        }

        // ============================================================================
        // 4. 저장 (웹소켓 OUT) 및 뷰어 URL 발급
        // ============================================================================
        function saveAndGenerate() {
            const mappings = [];
            const rows = document.querySelectorAll('.mapping-row');
            let mappingValid = true;

            rows.forEach(row => {
                const foodId = row.querySelector('.map-food').value;
                const minC = parseInt(row.querySelector('.map-min').value);
                const maxC = parseInt(row.querySelector('.map-max').value);
                if(!foodId) { mappingValid = false; return; }
                mappings.push({ foodId: foodId, minCoin: isNaN(minC) ? 0 : minC, maxCoin: isNaN(maxC) ? 999999 : maxC });
            });

            if(!mappingValid || mappings.length === 0) return showToast('먹이 맵핑 조건을 최소 1개 입력해주세요.', true);

            const payload = {
                streamer_id: currentUser,
                settings: {
                    foodMappings: mappings,
                    fixedDonors: fixedDonors
                }
            };

            // 로컬 서버로 실제 저장 패킷 전송
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "save_user_data", payload: payload }));
            } else {
                return showToast('로컬 서버와 연결되어 있지 않아 저장할 수 없습니다.', true);
            }

            // [URL 생성 완벽 구조화] 어떤 파일명으로 접속하든 무조건 오류 없이 Viewer.html 로 치환
            const urlObj = new URL(window.location.href);
            let path = urlObj.pathname;
            path = path.substring(0, path.lastIndexOf('/') + 1); // 마지막 슬래시 뒤의 파일명 모조리 삭제
            urlObj.pathname = path + 'Viewer.html';              // 안전하게 Viewer.html만 부착
            urlObj.search = '?user=' + encodeURIComponent(currentUser); // 쿼리 파라미터 세팅

            document.getElementById('final-url').innerText = urlObj.toString();
            document.getElementById('result-area').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copyUrl() {
            navigator.clipboard.writeText(document.getElementById('final-url').innerText);
            showToast('URL이 복사되었습니다.');
        }
    </script>
</body>
</html>
