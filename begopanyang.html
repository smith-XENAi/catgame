<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배고파냥 - 스트리머 설정 콘솔</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #222; padding: 30px; border-radius: 12px; border: 3px solid #0055aa; }
        input[type="text"], input[type="number"] { padding: 10px; background: #000; color: #fff; border: 1px solid #555; border-radius: 5px; }
        .btn { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; background: #00aa00; color: white; }
        .btn-random { background: #aa5500; }
        .section { margin-top: 30px; border-top: 2px solid #444; padding-top: 20px; }
        .cat-card { background: #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#00ffcc;">🐈 배고파냥 스트리머 세팅 보드</h1>
        
        <div>
            <h3>1. 라이브 계정 연동</h3>
            <input type="text" id="streamer-id" placeholder="@아이디 입력 (예: @yoom1111)">
            <button class="btn" onclick="login()">데이터 불러오기</button>
        </div>

        <div id="setup-area" style="display:none;" class="section">
            <h3>2. 출전 고양이 픽업 (최대 3마리)</h3>
            <p style="font-size:12px; color:#aaa;">고양이를 선택하고 <b>[스탯 리롤]</b> 버튼을 눌러 운명적인 능력치를 획득하세요. (수동 조작 불가)</p>
            <div id="cat-pickup-list">
                <!-- 마스터 DB에서 불러와 렌더링될 영역 -->
            </div>
            
            <h3 class="section">3. 후원 먹이 코인 맵핑</h3>
            <p style="font-size:12px; color:#aaa;">마스터가 등록한 먹이 목록 중, 어느 범위의 코인에서 드롭될지 설정하세요.</p>
            <div id="food-mapping-list">
                <!-- 마스터 DB에서 불러와 렌더링될 영역 -->
            </div>

            <div class="section">
                <button class="btn" style="width: 100%; font-size: 18px;" onclick="saveAndGenerateURL()">💾 설정 저장 및 방송용 URL 생성</button>
            </div>
            
            <div id="url-result" style="margin-top: 20px; color: #ffcc00; font-weight: bold; font-size: 14px; text-align: center;"></div>
        </div>
    </div>

    <script>
        // 향후 중앙 서버 통신 로직이 이식될 공간입니다.
        // 스탯 리롤 버튼 클릭 시 Math.random()을 통해 100포인트를 무작위 분배하는 로직이 여기에 작성됩니다.
        
        function login() {
            const id = document.getElementById('streamer-id').value;
            if(!id) return alert("아이디를 입력하세요.");
            document.getElementById('setup-area').style.display = 'block';
            // DB 로드 로직
        }

        function saveAndGenerateURL() {
            const id = document.getElementById('streamer-id').value;
            // DB 저장(POST) 통신 로직
            
            // 실제 방송용 화면은 송출 전용 뷰어(Viewer.html)를 띄우도록 설정됩니다.
            // 깃허브 업로드 시 동일 경로에 Viewer.html 파일이 함께 있어야 합니다.
            const viewerUrl = `${window.location.origin}${window.location.pathname.replace('begopanyang.html', '')}Viewer.html?user=${id}`;
            
            document.getElementById('url-result').innerHTML = `
                ✅ 설정 저장 완료!<br>
                방송용 브라우저 소스 URL: <a href="${viewerUrl}" target="_blank" style="color:#00ffcc;">${viewerUrl}</a>
            `;
        }
    </script>
</body>
</html>
